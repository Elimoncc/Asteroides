<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Asteroids - Canvas</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            border: 2px solid rgb(0, 161, 0);
        }

        #pantalla-game-over,
        #pantalla-you-win {
            display: none;
            position: absolute;
            inset: 0;
            background: black;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        #pantalla-game-over.visible,
        #pantalla-you-win.visible {
            display: flex;
        }

        #pantalla-game-over h1,
        #pantalla-you-win h1 {
            color: white;
            font-family: 'Courier New', monospace;
            font-size: clamp(48px, 10vw, 96px);
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
        }

        #btn-reiniciar,
        #btn-reiniciar-win {
            width: 220px;
            height: 50px;
            border: none;
            outline: none;
            color: #fff;
            background: #111;
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 10px;
        }

        #btn-reiniciar::before,
        #btn-reiniciar-win::before {
            content: '';
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            position: absolute;
            top: -2px;
            left: -2px;
            background-size: 400%;
            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            animation: glowing 20s linear infinite;
            opacity: 0;
            transition: opacity .3s ease-in-out;
            border-radius: 10px;
        }

        #btn-reiniciar:active,
        #btn-reiniciar-win:active {
            color: #000;
        }

        #btn-reiniciar:active:after,
        #btn-reiniciar-win:active:after {
            background: transparent;
        }

        #btn-reiniciar:hover:before,
        #btn-reiniciar-win:hover:before {
            opacity: 1;
        }

        #btn-reiniciar:after,
        #btn-reiniciar-win:after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111;
            left: 0;
            top: 0;
            border-radius: 10px;
        }

        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <div id="pantalla-game-over">
        <h1>PERDISTE</h1>
        <button id="btn-reiniciar">Volver a jugar</button>
    </div>

    <div id="pantalla-you-win">
        <h1>GANASTE!</h1>
        <button id="btn-reiniciar-win">Volver a jugar</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pantallaGameOver = document.getElementById('pantalla-game-over');
        const pantallaYouWin = document.getElementById('pantalla-you-win');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const btnReiniciarWin = document.getElementById('btn-reiniciar-win');

        const sonidoDisparo = new Audio('dispara.mp3');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Asteroide {
            static TIPOS = {
                grande:  { radio: 55, velocidad: 1.2, puntos: 12 },
                mediano: { radio: 35, velocidad: 1.8, puntos: 10 },
                pequeno: { radio: 18, velocidad: 2.5, puntos:  9 }
            };

            static FORMAS = {
                grande:  [0.95, 1.15, 0.85, 1.25, 0.90, 1.10, 0.80, 1.20, 0.95, 1.05, 0.88, 1.18],
                mediano: [0.90, 1.20, 0.85, 1.15, 0.95, 1.10, 0.80, 1.25, 0.92, 1.08],
                pequeno: [0.85, 1.25, 0.90, 1.15, 0.80, 1.20, 0.95, 1.10, 0.88]
            };

            constructor(x, y, tipo = 'grande') {
                this.x = x;
                this.y = y;
                this.tipo = tipo;

                const config = Asteroide.TIPOS[tipo];
                this.radio = config.radio;
                this.velocidad = config.velocidad;

                this.anguloMovimiento  = Math.random() * Math.PI * 2;
                this.anguloRotacion    = Math.random() * Math.PI * 2;
                this.velocidadRotacion = (Math.random() - 0.5) * 0.045;

                this.factorVertices = Asteroide.FORMAS[tipo];
            }

            actualizar() {
                this.x += Math.cos(this.anguloMovimiento) * this.velocidad;
                this.y += Math.sin(this.anguloMovimiento) * this.velocidad;
                this.anguloRotacion += this.velocidadRotacion;

                const r = this.radio;
                if (this.x < -r)               this.x = canvas.width + r;
                if (this.x > canvas.width + r)  this.x = -r;
                if (this.y < -r)               this.y = canvas.height + r;
                if (this.y > canvas.height + r) this.y = -r;
            }
        }

        class Bala {
            static VELOCIDAD = 12;
            static TAMANO    = 8;

            constructor(x, y, angulo) {
                this.x     = x;
                this.y     = y;
                this.angulo = angulo;
                this.rad   = angulo * Math.PI / 180;
            }

            actualizar() {
                this.x += Math.cos(this.rad) * Bala.VELOCIDAD;
                this.y += Math.sin(this.rad) * Bala.VELOCIDAD;
            }

            fueraDePantalla() {
                return (
                    this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height
                );
            }
        }

        class Nave {
            static TAMANO         = 30;
            static VELOCIDAD      = 6;
            static ROTACION       = 4;
            static RADIO_COLISION = 18;

            constructor() {
                this.x      = canvas.width  / 2;
                this.y      = canvas.height / 2;
                this.angulo = -90;
                this.balas  = [];
            }

            actualizar(entrada) {
                if (entrada.estaPresionada("ArrowLeft"))  this.angulo -= Nave.ROTACION;
                if (entrada.estaPresionada("ArrowRight")) this.angulo += Nave.ROTACION;

                if (entrada.estaPresionada("ArrowUp")) {
                    const rad = this.angulo * Math.PI / 180;
                    this.x += Math.cos(rad) * Nave.VELOCIDAD;
                    this.y += Math.sin(rad) * Nave.VELOCIDAD;
                }

                this.mantenerEnPantalla();
            }

            mantenerEnPantalla() {
                const cent = Nave.TAMANO / 2;
                if (this.x < -cent)               this.x = canvas.width  + cent;
                if (this.x > canvas.width  + cent) this.x = -cent;
                if (this.y < -cent)               this.y = canvas.height + cent;
                if (this.y > canvas.height + cent) this.y = -cent;
            }

            disparar() {
                const rad    = this.angulo * Math.PI / 180;
                const offset = 25;
                const balaX  = this.x + Math.cos(rad) * offset;
                const balaY  = this.y + Math.sin(rad) * offset;
                this.balas.push(new Bala(balaX, balaY, this.angulo));

                sonidoDisparo.currentTime = 0;
                sonidoDisparo.play();
            }

            colisionaCon(asteroide) {
                const distancia = Math.hypot(this.x - asteroide.x, this.y - asteroide.y);
                return distancia < Nave.RADIO_COLISION + asteroide.radio * 0.75;
            }
        }


        class Vista {
            limpiarPantalla() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            dibujarNave(nave) {
                ctx.save();
                ctx.translate(nave.x, nave.y);
                ctx.rotate(nave.angulo * Math.PI / 180);

                ctx.strokeStyle = '#424632';
                ctx.lineWidth   = 3;

                ctx.beginPath();
                ctx.moveTo( 25,   0);
                ctx.lineTo(-15,  15);
                ctx.lineTo(-10,   0);
                ctx.lineTo(-15, -15);
                ctx.closePath();
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0,   0);
                ctx.lineTo(-10, 0);
                ctx.stroke();

                ctx.restore();
            }

            dibujarBala(bala) {
                ctx.save();
                ctx.translate(bala.x, bala.y);
                ctx.rotate(bala.rad);
                ctx.fillStyle = '#c3fac4';
                ctx.fillRect(-10, -Bala.TAMANO / 2, 8, Bala.TAMANO);
                ctx.restore();
            }

            dibujarAsteroide(asteroide) {
                ctx.save();
                ctx.translate(asteroide.x, asteroide.y);
                ctx.rotate(asteroide.anguloRotacion);

                ctx.strokeStyle = '#aaaaaa';
                ctx.lineWidth   = 3;
                ctx.beginPath();

                const numPuntos = asteroide.factorVertices.length;

                for (let i = 0; i < numPuntos; i++) {
                    const ang      = (i / numPuntos) * Math.PI * 2;
                    const radioReal = asteroide.radio * asteroide.factorVertices[i];
                    const px = Math.cos(ang) * radioReal;
                    const py = Math.sin(ang) * radioReal;

                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }

                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }

            renderizar(nave, asteroides) {
                this.limpiarPantalla();
                this.dibujarNave(nave);
                nave.balas.forEach(bala => this.dibujarBala(bala));
                asteroides.forEach(ast  => this.dibujarAsteroide(ast));
            }
        }

        class ManejadorEntrada {
            constructor(alDisparar) {
                this.teclasPresionadas = {};
                this.alDisparar = alDisparar;
                this.escucharTeclado();
            }

            estaPresionada(tecla) {
                return !!this.teclasPresionadas[tecla];
            }

            escucharTeclado() {
                document.addEventListener("keydown", (e) => {
                    this.teclasPresionadas[e.key] = true;
                    if (e.key === " ") {
                        e.preventDefault();
                        this.alDisparar();
                    }
                });
                document.addEventListener("keyup", (e) => {
                    this.teclasPresionadas[e.key] = false;
                });
            }

            limpiarTeclas() {
                this.teclasPresionadas = {};
            }
        }

        class Juego {
            constructor() {
                this.nave   = new Nave();
                this.vista  = new Vista();
                this.entrada = new ManejadorEntrada(() => {
                    if (!this.pausado) this.nave.disparar();
                });
                this.asteroides = [];
                this.pausado    = false;

                this.crearAsteroidesIniciales(8);
                this.configurarBotonesReiniciar();
            }

            configurarBotonesReiniciar() {
                btnReiniciar.addEventListener('click',    () => this.reiniciar());
                btnReiniciarWin.addEventListener('click', () => this.reiniciar());
            }

            reiniciar() {
                this.nave    = new Nave();
                this.entrada.alDisparar = () => {
                    if (!this.pausado) this.nave.disparar();
                };
                this.entrada.limpiarTeclas();
                this.asteroides = [];
                this.pausado    = false;

                this.crearAsteroidesIniciales(8);

                pantallaGameOver.classList.remove('visible');
                pantallaYouWin.classList.remove('visible');
            }

            crearAsteroidesIniciales(cantidad) {
                for (let i = 0; i < cantidad; i++) {
                    let x, y;
                    do {
                        x = Math.random() * canvas.width;
                        y = Math.random() * canvas.height;
                    } while (Math.hypot(x - this.nave.x, y - this.nave.y) < 150);

                    const rand = Math.random();
                    let tipo = 'grande';
                    if (rand > 0.7) tipo = 'mediano';
                    if (rand > 0.9) tipo = 'pequeno';

                    this.asteroides.push(new Asteroide(x, y, tipo));
                }
            }

            verificarColisiones() {
                for (const asteroide of this.asteroides) {
                    if (this.nave.colisionaCon(asteroide)) {
                        this.gameOver();
                        return;
                    }
                }
            }

            gameOver() {
                this.pausado = true;
                pantallaGameOver.classList.add('visible');
            }

            youWin() {
                this.pausado = true;
                pantallaYouWin.classList.add('visible');
            }

            actualizar() {
                if (this.pausado) return;

                this.nave.actualizar(this.entrada);

                for (let i = this.nave.balas.length - 1; i >= 0; i--) {
                    const bala = this.nave.balas[i];
                    bala.actualizar();

                    if (bala.fueraDePantalla()) {
                        this.nave.balas.splice(i, 1);
                        continue;
                    }

                    let impacto = false;
                    for (let j = this.asteroides.length - 1; j >= 0; j--) {
                        const ast = this.asteroides[j];
                        if (Math.hypot(bala.x - ast.x, bala.y - ast.y) < ast.radio * 0.75) {
                            this.asteroides.splice(j, 1);
                            impacto = true;
                            break;
                        }
                    }

                    if (impacto) this.nave.balas.splice(i, 1);
                }

                this.asteroides.forEach(ast => ast.actualizar());
                this.verificarColisiones();

                if (this.asteroides.length === 0) this.youWin();
            }

            loop() {
                this.actualizar();
                this.vista.renderizar(this.nave, this.asteroides);
                requestAnimationFrame(() => this.loop());
            }

            iniciar() {
                this.loop();
            }
        }

        const juego = new Juego();
        juego.iniciar();
    </script>

</body>

</html>
